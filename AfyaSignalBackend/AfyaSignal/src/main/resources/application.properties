# ===== SERVER =====
server.port=8082

# ===== PostgreSQL =====
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:afyasignal}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USERNAME:afyasignal}
spring.datasource.password=${DB_PASSWORD:afyasignal123}

# ===== JPA =====
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
app.demo-data.enabled=${DEMO_DATA_ENABLED:false}

# ===== JWT =====
app.jwt.secret=${JWT_SECRET:afyasignal-secret-key-change-in-production-must-be-256-bits-long}
app.jwt.expiration=${JWT_EXPIRATION:86400000}

# ===== GEMINI =====
gemini.api.key=${GEMINI_API_KEY:GEMINI_API_KEY}

# ===== CORS =====
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha

spring.profiles.active=dev
