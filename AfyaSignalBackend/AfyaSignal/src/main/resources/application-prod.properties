# ===== PROD ENV =====
# Render provides these environment variables. Do not commit production secrets.
spring.config.import=optional:file:.env.prod[.properties]

# ===== PROD DATABASE =====
# ProdDataSourceConfig accepts Render DATABASE_URL, a JDBC SPRING_DATASOURCE_URL,
# or DB_HOST/DB_PORT/DB_NAME with credentials.

# ===== PROD JPA =====
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:validate}

# ===== PROD SEEDING =====
app.demo-data.enabled=false

# ===== PROD JWT =====
app.jwt.secret=${JWT_SECRET}

# ===== PROD GEMINI =====
gemini.api.key=${GEMINI_API_KEY}

# ===== PROD CORS =====
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS}

# ===== PROD OPENAPI =====
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false
