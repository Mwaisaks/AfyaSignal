# ===== DEV ENV IMPORT =====
spring.config.import=optional:file:.env[.properties],optional:file:.env.dev[.properties]

# ===== DEV DATABASE =====
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:afyasignal}}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USERNAME:afyasignal}
spring.datasource.password=${DB_PASSWORD:afyasignal123}

# ===== DEV JPA =====
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}

# ===== DEV SEEDING =====
app.demo-data.enabled=${DEMO_DATA_ENABLED:false}

# ===== DEV JWT =====
app.jwt.secret=${JWT_SECRET:afyasignal-local-development-secret-key-change-in-production}

# ===== DEV GEMINI =====
gemini.api.key=${GEMINI_API_KEY:}

# ===== DEV CORS =====
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000}

# ===== DEV OPENAPI =====
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
