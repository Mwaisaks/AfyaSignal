services:

  db:
    image: postgres:16-alpine
    container_name: afyasignal-db
    environment:
      POSTGRES_DB: afyasignal
      POSTGRES_USER: afyasignal
      POSTGRES_PASSWORD: afyasignal123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U afyasignal"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: